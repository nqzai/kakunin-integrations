name: Publish package

# Tag format: <package>@<version>, e.g. mastra@0.2.0, ai-sdk@0.2.0
on:
  push:
    tags:
      - '*@*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - name: Resolve package directory from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%@*}"
          if [ ! -d "packages/$PKG" ]; then
            echo "No package dir for tag '$TAG' (expected packages/$PKG)"; exit 1
          fi
          echo "PKG_DIR=packages/$PKG" >> "$GITHUB_ENV"
      - run: npm run build -w "$PKG_DIR"
      - run: npm run typecheck -w "$PKG_DIR"
      - name: Publish with provenance
        run: npm publish -w "$PKG_DIR" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
