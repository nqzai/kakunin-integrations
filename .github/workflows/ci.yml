name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build, type-check & test (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
